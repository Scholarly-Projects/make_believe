---
# Default leaflet map page
layout: default
custom-foot: js/map-js.html
---
{% include essay/header-scrollytelling.html %}
<style>
  /* ── Hide everything that isn't the map ───────────────────────────── */
  /* CB's default layout renders a main content wrapper and possible
     padding divs. Remove any gap they introduce.                        */
  body,
  html {
    overflow: hidden;
  }

  /* The CB default layout injects a #maincontent wrapper with padding.
     Zero it out so the map can claim the full viewport.                 */
  #maincontent,
  #cb-page-content,
  .container,
  .container-fluid,
  main {
    padding:  0 !important;
    margin:   0 !important;
    overflow: hidden;
  }

  /* ── Map wrapper ──────────────────────────────────────────────────── */
  /* Sits between the fixed header (--scrolly-header-h) at the top and
     the fixed footer (2.8rem) at the bottom. No extra band anywhere.   */
  #map-wrapper {
    position: fixed;
    top:    var(--scrolly-header-h, 52px);
    left:   0;
    right:  0;
    bottom: 2.8rem;          /* matches .scrolly-footer height */
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #e8e4da;     /* neutral fallback while tiles load */
  }

  #map {
    width:  100%;
    height: 100%;
    margin: 0;
    padding: 0;
  }

  /* ── Mobile ───────────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    #map-wrapper {
      /* On mobile the header is slightly shorter; the CSS variable
         updates automatically via the JS in header-scrollytelling.html */
      top: var(--scrolly-header-h, 52px);
    }
  }
</style>

<div id="map-wrapper">
  <h2 class="visually-hidden">Map of Collection Items</h2>
  <div id="map"></div>
</div>

{% include essay/footer-scrollytelling.html %}
