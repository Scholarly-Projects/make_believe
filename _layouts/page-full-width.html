---
# Sets page in container-fluid to fill window with min gutter
layout: default
---
{% include essay/header-scrollytelling.html %}
<style>
  /* ── Suppress CB default layout padding ──────────────────────────── */
  #maincontent,
  #cb-page-content,
  .container,
  .container-fluid,
  main {
    padding:  0 !important;
    margin:   0 !important;
  }

  /* ── Page wrapper: fills the viewport between fixed header and footer */
  #page-full-wrapper {
    position: fixed;
    top:    var(--scrolly-header-h, 52px);
    left:   0;
    right:  0;
    bottom: 2.8rem;          /* matches .scrolly-footer height */
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #F4F4F4;
    transition: background-color 0.3s ease;
  }

  body.light-mode #page-full-wrapper {
    background: #1C1C1D;
  }

  /* ── Scrollable inner container ───────────────────────────────────── */
  #page-full-inner {
    width: 100%;
    height: 100%;
    overflow: hidden;        /* Changed from auto - timeline handles scrolling */
    overflow-x: hidden;
    padding: 0;              /* Zero padding for timeline pages */
    box-sizing: border-box;
    max-width: 100%;
  }

  /* ── Timeline-specific: full height embed ────────────────────────── */
  #page-full-inner:has(#timeline-embed) {
    padding:  0;
    overflow: hidden;
  }
  
  #page-full-inner:has(#timeline-embed) #timeline-embed {
    width: 100% !important;
    height: 100% !important;
    min-height: calc(100vh - var(--scrolly-header-h, 52px) - 2.8rem);
  }

  /* ── Typography ───────────────────────────────────────────────────── */
  #page-full-inner,
  #page-full-inner p,
  #page-full-inner li,
  #page-full-inner h1,
  #page-full-inner h2,
  #page-full-inner h3,
  #page-full-inner h4,
  #page-full-inner h5,
  #page-full-inner h6 {
    color: #1C1C1D;
  }

  body.light-mode #page-full-inner,
  body.light-mode #page-full-inner p,
  body.light-mode #page-full-inner li,
  body.light-mode #page-full-inner h1,
  body.light-mode #page-full-inner h2,
  body.light-mode #page-full-inner h3,
  body.light-mode #page-full-inner h4,
  body.light-mode #page-full-inner h5,
  body.light-mode #page-full-inner h6 {
    color: #E4E4E4;
  }

  /* ── Links ────────────────────────────────────────────────────────── */
  #page-full-inner a {
    color: #2563eb;
    transition: color 0.15s ease;
  }
  #page-full-inner a:hover {
    color: #1d4ed8;
  }

  body.light-mode #page-full-inner a {
    color: #6ea8fe;
  }
  body.light-mode #page-full-inner a:hover {
    color: #93bbff;
  }

  /* ── Mobile ───────────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    #page-full-wrapper {
      top: var(--scrolly-header-h, 52px);
    }
    #page-full-inner:has(#timeline-embed) #timeline-embed {
      min-height: calc(100vh - var(--scrolly-header-h, 52px) - 2.8rem);
    }
  }
</style>
<div id="page-full-wrapper">
  <div id="page-full-inner">
    {{ content }}
  </div>
</div>

<script>
/* ── Timeline keyboard navigation ────────────────────────────────────
   ArrowLeft / ArrowRight move through timeline slides.
   ArrowUp / ArrowDown scroll is disabled for timeline pages.          */

window.scrollyFooterOwnsKeyboard = false;

(function () {
  'use strict';

  var NAV_SELECTORS = [
    ['.tl-slidenav-previous', '.tl-slidenav-next'],
    ['[class*="slidenav-prev"]', '[class*="slidenav-next"]'],
    ['[aria-label*="previous" i]', '[aria-label*="next" i]'],
    ['[aria-label*="prev" i]',     '[aria-label*="next" i]'],
    ['.tl-button-prev', '.tl-button-next'],
  ];

  function findNavButtons() {
    for (var i = 0; i < NAV_SELECTORS.length; i++) {
      var prev = document.querySelector(NAV_SELECTORS[i][0]);
      var next = document.querySelector(NAV_SELECTORS[i][1]);
      if (prev || next) return { prev: prev, next: next };
    }
    return null;
  }

  function findNavInFrames() {
    var frames = document.querySelectorAll('iframe');
    for (var f = 0; f < frames.length; f++) {
      try {
        var doc = frames[f].contentDocument || frames[f].contentWindow.document;
        for (var i = 0; i < NAV_SELECTORS.length; i++) {
          var prev = doc.querySelector(NAV_SELECTORS[i][0]);
          var next = doc.querySelector(NAV_SELECTORS[i][1]);
          if (prev || next) return { prev: prev, next: next };
        }
      } catch (e) { /* cross-origin iframe — skip */ }
    }
    return null;
  }

  document.addEventListener('keydown', function (e) {
    var tag = document.activeElement ? document.activeElement.tagName : '';
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if (document.activeElement && document.activeElement.isContentEditable) return;

    var key = e.key;

    /* ── Up / Down: disabled for timeline pages ────────────────────── */
    if (key === 'ArrowDown' || key === 'Down' || key === 'ArrowUp' || key === 'Up') {
      /* TimelineJS handles its own vertical navigation */
      return;
    }

    /* ── Left / Right: drive timeline prev / next ───────────────────── */
    if (key === 'ArrowLeft' || key === 'Left' || key === 'ArrowRight' || key === 'Right') {
      e.preventDefault();
      e.stopImmediatePropagation();

      var btns = findNavButtons() || findNavInFrames();
      if (!btns) return;

      if ((key === 'ArrowLeft' || key === 'Left') && btns.prev) {
        btns.prev.click();
      } else if ((key === 'ArrowRight' || key === 'Right') && btns.next) {
        btns.next.click();
      }
    }

  }, true);

}());
</script>
{% include essay/footer-scrollytelling.html %}
